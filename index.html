<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador QR Code Pix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body class="min-h-screen bg-[#f5f6fb] p-4 text-slate-100 md:p-8">
  <div class="mx-auto flex min-h-[calc(100vh-2rem)] max-w-7xl items-center justify-center">
    <section class="w-full rounded-[36px] bg-white p-6 shadow-[0_30px_90px_rgba(15,23,42,0.08)] md:p-10">
      <div class="mb-10">
        <h1 class="text-3xl font-black tracking-tight text-slate-800 md:text-4xl">QR Code Pix</h1>
        <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-500">Formulario reduzido para gerar o copia e cola com menos atrito. Informe a chave Pix, um identificador opcional e o valor.</p>
      </div>

      <form id="pixForm" class="space-y-6">
          <div>
            <label for="pixKeyType" class="mb-3 block text-xl font-bold text-slate-800">Tipo da Chave</label>
            <select
              id="pixKeyType"
              class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-4 text-2xl text-slate-800 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
              required
            >
              <option value="cpf">CPF</option>
              <option value="cnpj">CNPJ</option>
              <option value="email">Email</option>
              <option value="phone">Telefone</option>
              <option value="random">Aleatoria</option>
            </select>
          </div>

          <div>
            <div class="mb-3 flex items-center justify-between gap-3">
              <label for="pixKey" class="block text-xl font-bold text-slate-800">Chave Pix</label>
              <span id="pixKeyHelper" class="text-sm text-slate-400"></span>
            </div>
            <input
              type="text"
              id="pixKey"
              class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-4 text-2xl text-slate-800 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
              required
            >
          </div>

          <div>
            <div class="mb-3 flex items-center justify-between gap-3">
              <label for="identifier" class="block text-xl font-bold text-slate-800">Identificador</label>
              <span class="text-lg italic text-slate-500">Opcional</span>
            </div>
            <input
              type="text"
              id="identifier"
              placeholder="PGTOLOJA123"
              class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-4 text-2xl text-slate-800 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            >
          </div>

          <div>
            <div class="mb-3 flex items-center justify-between gap-3">
              <label for="amount" class="block text-xl font-bold text-slate-800">Valor (R$)</label>
              <span class="text-lg italic text-slate-500">Opcional</span>
            </div>
            <input
              type="number"
              id="amount"
              placeholder="0,00"
              step="0.01"
              min="0"
              class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-4 text-2xl text-slate-800 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            >
          </div>

          <p id="formError" class="hidden rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700"></p>

          <button
            type="submit"
            class="w-full rounded-2xl bg-[#f17b2c] px-4 py-4 text-lg font-bold text-white transition hover:bg-[#df6b1f]"
          >
            Gerar QR Code
          </button>
      </form>
    </section>
  </div>

  <div id="resultModal" class="fixed inset-0 z-50 hidden">
    <div id="modalOverlay" class="absolute inset-0 bg-slate-950/70 backdrop-blur-sm"></div>
    <div class="relative z-10 flex min-h-full items-center justify-center p-4">
      <div class="w-full max-w-lg rounded-[28px] bg-white p-6 shadow-2xl shadow-slate-950/40">
        <div class="flex items-start justify-between gap-4">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.2em] text-cyan-600">QR Code Pix</p>
            <h3 class="mt-2 text-2xl font-black text-slate-900">Pagamento pronto para copiar</h3>
          </div>
          <button
            id="closeModalBtn"
            type="button"
            class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 text-xl text-slate-600 transition hover:bg-slate-100"
            aria-label="Fechar modal"
          >
            ×
          </button>
        </div>

        <div class="mt-6 rounded-[24px] bg-slate-100 p-6">
          <canvas id="qrCode" class="mx-auto"></canvas>
        </div>

        <div class="mt-6 space-y-3">
          <div>
            <label for="pixCopyPaste" class="mb-2 block text-sm font-semibold text-slate-700">Pix Copia e Cola</label>
            <div class="flex flex-col gap-2 sm:flex-row">
              <input
                type="text"
                id="pixCopyPaste"
                readonly
                class="flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700"
              >
              <button
                id="copyBtn"
                type="button"
                class="inline-flex items-center justify-center rounded-2xl bg-emerald-500 px-5 py-3 text-sm font-bold text-white transition hover:bg-emerald-400"
              >
                Copiar
              </button>
            </div>
          </div>

          <p id="amountDisplay" class="hidden rounded-2xl bg-cyan-50 px-4 py-3 text-center text-base font-bold text-cyan-900"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
